<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>আমার হিসাব</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0f1117; --surface:#1a1d27; --surface2:#222536; --border:#2e3248;
  --green:#00d68f; --green-dim:#00d68f22; --blue:#4d9fff; --blue-dim:#4d9fff22;
  --red:#ff6b6b; --red-dim:#ff6b6b22; --orange:#ff9f43; --orange-dim:#ff9f4322;
  --text:#e8eaf6; --muted:#7b80a0; --accent:#7c6df0; --accent-dim:#7c6df022;
  --r:16px; --rs:10px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Hind Siliguri',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:430px;margin:0 auto;overflow-x:hidden}

/* UI Components (Loading, Login, Layout) */
#appLoading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:998;flex-direction:column;gap:14px}
.spin{width:38px;height:38px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

#loginScreen{position:fixed;inset:0;background:var(--bg);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:999;padding:30px}
.login-logo{font-size:70px;margin-bottom:16px}
.login-title{font-size:26px;font-weight:700;margin-bottom:8px;text-align:center}
.login-sub{font-size:14px;color:var(--muted);margin-bottom:44px;text-align:center;line-height:1.7}
.google-btn{display:flex;align-items:center;gap:12px;background:#fff;color:#333;border:none;border-radius:50px;padding:14px 28px;font-size:15px;font-weight:600;font-family:'Hind Siliguri',sans-serif;cursor:pointer;box-shadow:0 4px 24px rgba(0,0,0,.35);transition:all .2s;width:100%;justify-content:center;max-width:280px}
.google-btn:active{transform:scale(.97)}
.google-btn img{width:22px;height:22px}

#loadingBar{height:3px;background:linear-gradient(90deg,var(--accent),var(--blue),var(--green));background-size:200%;animation:la 1.2s linear infinite;display:none}
@keyframes la{0%{background-position:0%}100%{background-position:200%}}

.status-bar{background:var(--surface);padding:10px 14px 8px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.app-title{font-size:16px;font-weight:700}
.user-info{display:flex;align-items:center;gap:8px}
.user-avatar{width:30px;height:30px;border-radius:50%;border:2px solid var(--accent);object-fit:cover;background:var(--surface2)}
.user-name{font-size:11px;color:var(--muted);max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.signout-btn{background:var(--red-dim);border:none;color:var(--red);font-size:11px;font-weight:600;padding:4px 8px;border-radius:6px;cursor:pointer}

.nav-tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border)}
.nav-tab{flex:1;padding:10px 4px;text-align:center;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent}
.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* Summary & Grid Cards */
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px 14px 8px}
.summary-card{background:var(--surface);border-radius:var(--r);padding:14px;border:1px solid var(--border);position:relative;overflow:hidden}
.card-icon{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;margin-bottom:8px}
.card-amount{font-size:18px;font-weight:700}

/* Action Buttons */
.action-btns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:6px 14px 10px}
.action-btn{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:10px 6px;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer}

/* History Items */
.history-section{padding:0 14px 120px}
.tx-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:11px 12px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.tx-icon{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:17px}

/* Modals */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(4px);z-index:200;display:none;align-items:flex-end}
.modal-overlay.active{display:flex}
.modal{background:var(--surface);border-radius:24px 24px 0 0;padding:20px 18px 38px;width:100%;border:1px solid var(--border)}
.input-field{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:11px 13px;font-size:14px;color:var(--text);margin-bottom:12px;outline:none}
.submit-btn{width:100%;padding:13px;border-radius:var(--rs);border:none;font-size:14px;font-weight:700;cursor:pointer}

/* Toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface2);border:1px solid var(--border);border-radius:50px;padding:9px 20px;font-size:13px;opacity:0;transition:0.3s;z-index:500}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div id="appLoading"><div class="spin"></div><div style="font-size:13px;color:var(--muted)">লোড হচ্ছে...</div></div>

<div id="loginScreen">
  <div class="login-logo">💰</div>
  <div class="login-title">আমার হিসাব</div>
  <div class="login-sub">নিরাপদে আপনার আয়-ব্যয় ট্র্যাকিং করুন</div>
  <button class="google-btn" onclick="signInWithGoogle()">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="G">
    Google দিয়ে সাইন ইন
  </button>
</div>

<div id="mainApp" style="display:none">
  <div class="status-bar">
    <div class="app-title">💰 আমার হিসাব</div>
    <div class="user-info">
      <img class="user-avatar" id="userAvatar" src="" alt="">
      <span class="user-name" id="userName"></span>
      <button class="signout-btn" onclick="doSignOut()">বের হন</button>
    </div>
  </div>
  <div id="loadingBar"></div>

  <div class="nav-tabs">
    <div class="nav-tab active" onclick="switchTab('main',this)">🏠 হিসাব</div>
    <div class="nav-tab" onclick="switchTab('trash',this)">🗑️ ট্র্যাশ</div>
  </div>

  <div id="tab-main">
    <div class="summary-grid">
      <div class="summary-card"><div class="card-amount" id="totalBalance">৳ ০</div><div style="font-size:10px;color:var(--muted)">মোট ব্যালেন্স</div></div>
      <div class="summary-card"><div class="card-amount" id="physicalBalance" style="color:var(--green)">৳ ০</div><div style="font-size:10px;color:var(--muted)">হাতে নগদ</div></div>
    </div>

    <div class="action-btns">
      <div class="action-btn" onclick="openModal('balance')"><span>➕ ব্যালেন্স</span></div>
      <div class="action-btn" onclick="openModal('loan')"><span>🤝 লোন</span></div>
      <div class="action-btn" onclick="openModal('expense')"><span>💸 ব্যয়</span></div>
    </div>

    <div class="history-section">
      <div id="transactionList"></div>
    </div>
  </div>

  <div id="tab-trash" style="display:none">
    <div id="trashList" class="history-section"></div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this) closeModal()">
  <div class="modal">
    <h3 id="modalTitle" style="margin-bottom:15px"></h3>
    <input type="number" class="input-field" id="amountInput" placeholder="পরিমাণ (টাকা)" inputmode="decimal">
    <input type="text" class="input-field" id="noteInput" placeholder="বিবরণ (ঐচ্ছিক)">
    <input type="date" class="input-field" id="dateInput">
    <button class="submit-btn" id="submitBtn" onclick="submitTransaction()" style="background:var(--accent);color:#fff">সেভ করুন</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
// Firebase কনফিগারেশন
const firebaseConfig = {
  apiKey: "AIzaSyCNiFP5yYdur71LzTz09PLAwkRhkwL_xTg",
  authDomain: "amar-hisab-ac1db.firebaseapp.com",
  projectId: "amar-hisab-ac1db",
  storageBucket: "amar-hisab-ac1db.firebasestorage.app",
  messagingSenderId: "1061997143103",
  appId: "1:1061997143103:web:52b3e76a03f7b7ff29048a"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const provider = new firebase.auth.GoogleAuthProvider();

// সেশন পারসিস্টেন্স সেটআপ (LOCAL মানে সেশন স্থায়ী হবে)
auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

let currentUser = null;
let transactions = [];

// অথেনটিকেশন চেক
auth.onAuthStateChanged(user => {
  const loading = document.getElementById('appLoading');
  if (user) {
    currentUser = user;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    document.getElementById('userAvatar').src = user.photoURL || '';
    document.getElementById('userName').textContent = user.displayName;
    loading.style.display = 'none';
    startDataListener();
  } else {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('mainApp').style.display = 'none';
    loading.style.display = 'none';
  }
});

// পপ-আপ লগইন পদ্ধতি (সবচেয়ে স্টেবল)
function signInWithGoogle() {
  document.getElementById('appLoading').style.display = 'flex';
  auth.signInWithPopup(provider)
    .catch(err => {
      document.getElementById('appLoading').style.display = 'none';
      console.error(err);
      alert("লগইন সমস্যা: " + err.message);
    });
}

function doSignOut() {
  auth.signOut().then(() => location.reload());
}

// ডেটা লিসেনার
function startDataListener() {
  db.collection('users').doc(currentUser.uid).collection('transactions')
    .orderBy('createdAt', 'desc')
    .onSnapshot(snap => {
      transactions = snap.docs.map(d => ({id: d.id, ...d.data()}));
      renderUI();
    });
}

function renderUI() {
  let bal=0, phy=0, loan=0, exp=0;
  const list = document.getElementById('transactionList');
  list.innerHTML = '';

  transactions.forEach(t => {
    if(t.type==='balance') { bal += t.amount; phy += t.amount; }
    if(t.type==='loan') { loan += t.amount; phy -= t.amount; }
    if(t.type==='expense') { exp += t.amount; phy -= t.amount; }

    list.innerHTML += `
      <div class="tx-item">
        <div class="tx-icon" style="background:var(--surface2)">${t.type==='balance'?'💰':t.type==='loan'?'🤝':'💸'}</div>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:600">${t.note || 'বিবরণ নেই'}</div>
          <div style="font-size:10px;color:var(--muted)">${t.date}</div>
        </div>
        <div style="text-align:right">
          <div style="font-weight:700; color:${t.type==='balance'?'var(--green)':'var(--red)'}">৳ ${t.amount}</div>
        </div>
      </div>`;
  });

  document.getElementById('totalBalance').textContent = '৳ ' + bal;
  document.getElementById('physicalBalance').textContent = '৳ ' + phy;
}

// ট্রানজ্যাকশন সাবমিট
let currentType = 'balance';
function openModal(type) {
  currentType = type;
  document.getElementById('modalTitle').textContent = type==='balance'?'ব্যালেন্স যোগ':'লোন বা ব্যয়';
  document.getElementById('dateInput').value = new Date().toISOString().split('T')[0];
  document.getElementById('modalOverlay').classList.add('active');
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); }

async function submitTransaction() {
  const amount = parseFloat(document.getElementById('amountInput').value);
  const note = document.getElementById('noteInput').value;
  const date = document.getElementById('dateInput').value;

  if(!amount) return alert("পরিমাণ দিন");

  await db.collection('users').doc(currentUser.uid).collection('transactions').add({
    type: currentType,
    amount: amount,
    note: note,
    date: date,
    createdAt: Date.now()
  });

  closeModal();
  showToast("সফলভাবে সেভ হয়েছে");
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function switchTab(tab, el) {
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  // ট্যাব লজিক এখানে হবে
}
</script>
</body>
</html>
